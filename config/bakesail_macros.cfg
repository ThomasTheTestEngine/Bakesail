# =============================================================================
# bakesail_macros.cfg
# Drop this file into ~/printer_data/config/ and add
#   [include bakesail_macros.cfg]
# to your printer.cfg (the Bakesail setup wizard does this automatically).
# =============================================================================

# -----------------------------------------------------------------------------
# BAKESAIL_TEST_PIN
# Briefly pulses a GPIO pin so the user can confirm correct wiring during the
# setup wizard. Called by the frontend via Moonraker's /printer/gcode/script.
#
# Parameters:
#   PIN     - Klipper pin name (e.g. PA5, PB0) — must be defined as an
#             [output_pin] named bakesail_test_pin in printer.cfg.
#             The wizard rewrites this definition before each test.
#   VALUE   - 1 (default) to pulse high, 0 to pulse low
#   DURATION - pulse duration in seconds (default 0.5)
# -----------------------------------------------------------------------------
[gcode_macro BAKESAIL_TEST_PIN]
description: Pulse a pin briefly for wizard wiring verification
gcode:
    {% set value    = params.VALUE    | default(1)   | int %}
    {% set duration = params.DURATION | default(0.5) | float %}
    SET_PIN PIN=bakesail_test_pin VALUE={value}
    G4 P{(duration * 1000) | int}
    SET_PIN PIN=bakesail_test_pin VALUE={1 - value}

# -----------------------------------------------------------------------------
# BAKESAIL_ESTOP
# Emergency stop called by the frontend Abort button as a belt-and-suspenders
# measure in addition to the profile state machine abort path.
# -----------------------------------------------------------------------------
[gcode_macro BAKESAIL_ESTOP]
description: Emergency stop — turns off all heaters and fans immediately
gcode:
    TURN_OFF_HEATERS
    M107        ; fan off
    M84         ; steppers off
    { action_respond_info("BAKESAIL: Emergency stop executed") }
