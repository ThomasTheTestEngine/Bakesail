# bakesail.cfg — DUMMY TEST CONFIG
# Uses Pi host GPIO pins as dummy outputs and temperature_host for all sensors.
# Nothing is connected — safe to run, used for UI development only.
# Replace with wizard-generated config when real hardware is attached.
# Generated: manually

# ==============================================================
# Host MCU must be running for host: pins to work.
# Check with: sudo systemctl status klipper-mcu
# ==============================================================

# ==============================================================
# Thermocouple sensors — all reading Pi CPU temp as a stand-in
# ==============================================================

[temperature_sensor tc_1]
sensor_type: temperature_host

[temperature_sensor tc_2]
sensor_type: temperature_host

[temperature_sensor tc_3]
sensor_type: temperature_host

# ==============================================================
# Heater zones — dummy host GPIO outputs, CPU temp as sensor
# ==============================================================

[heater_generic zone_1]
heater_pin: host:gpio17
sensor_type: temperature_host
control: watermark
max_delta: 999
min_temp: 0
max_temp: 100

[heater_generic zone_2]
heater_pin: host:gpio18
sensor_type: temperature_host
control: watermark
max_delta: 999
min_temp: 0
max_temp: 100

[heater_generic zone_3]
heater_pin: host:gpio19
sensor_type: temperature_host
control: watermark
max_delta: 999
min_temp: 0
max_temp: 100

# ==============================================================
# Fans — dummy host GPIO outputs
# ==============================================================

[fan_generic fan_1]
pin: host:gpio20

[fan_generic fan_2]
pin: host:gpio21

# ==============================================================
# Vacuum pen — dummy host GPIO
# ==============================================================

[output_pin vacuum_pen]
pin: host:gpio22
value: 0
shutdown_value: 0

# ==============================================================
# Test pin placeholder
# ==============================================================

[output_pin bakesail_test_pin]
pin: host:gpio23
value: 0

# ==============================================================
# Bakesail main configuration
# ==============================================================

[bakesail]
device_type: ir_rework
machine_class: semi_auto
profiles_path: ~/printer_data/config/bakesail_profiles

heater_zone1: heater_generic zone_1
sensor_zone1: temperature_sensor tc_1

heater_zone2: heater_generic zone_2
sensor_zone2: temperature_sensor tc_2

heater_zone3: heater_generic zone_3
sensor_zone3: temperature_sensor tc_3

fan1: fan_generic fan_1
fan2: fan_generic fan_2

has_vacuum_pen: True

[include bakesail_macros.cfg]
