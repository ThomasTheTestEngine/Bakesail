# =============================================================================
# Bakesail nginx site configuration — port 80
# Installed by install.sh. BAKESAIL_DIST_PATH is substituted at install time.
# Mainsail is moved to port 8888 alongside this config.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream moonraker {
    server 127.0.0.1:7125;
}

# Crowsnest/ustreamer camera streams (ports match crowsnest.conf defaults)
upstream mjpgstreamer1 { server 127.0.0.1:8080; }
upstream mjpgstreamer2 { server 127.0.0.1:8081; }
upstream mjpgstreamer3 { server 127.0.0.1:8082; }
upstream mjpgstreamer4 { server 127.0.0.1:8083; }

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root BAKESAIL_DIST_PATH;
    index index.html;

    client_max_body_size 0;
    proxy_request_buffering off;

    location /api      { proxy_pass http://moonraker; }
    location /printer  { proxy_pass http://moonraker; }
    location /access   { proxy_pass http://moonraker; }
    location /machine  { proxy_pass http://moonraker; }

    location /server {
        proxy_pass http://moonraker;
        client_max_body_size 200M;
    }

    location /websocket {
        proxy_pass         http://moonraker;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    location /webcam/ {
        postpone_output 0;
        proxy_buffering off;
        proxy_ignore_headers X-Accel-Buffering;
        access_log off;
        error_log  off;
        proxy_pass http://mjpgstreamer1/;
    }

    location /webcam2/ {
        postpone_output 0;
        proxy_buffering off;
        proxy_ignore_headers X-Accel-Buffering;
        access_log off;
        error_log  off;
        proxy_pass http://mjpgstreamer2/;
    }

    location /webcam3/ {
        postpone_output 0;
        proxy_buffering off;
        proxy_ignore_headers X-Accel-Buffering;
        access_log off;
        error_log  off;
        proxy_pass http://mjpgstreamer3/;
    }

    location /webcam4/ {
        postpone_output 0;
        proxy_buffering off;
        proxy_ignore_headers X-Accel-Buffering;
        access_log off;
        error_log  off;
        proxy_pass http://mjpgstreamer4/;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must never be cached — it references hashed asset filenames
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
