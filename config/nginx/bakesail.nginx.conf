# =============================================================================
# Bakesail nginx site configuration
# Replaces the Mainsail site config. Mainsail's original is backed up
# to ~/bakesail/.nginx_backup/mainsail.bak by the installer.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream moonraker {
    # Moonraker's default address — adjust port here if changed
    server 127.0.0.1:7125;
}

# Shared proxy headers
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Serve the Bakesail Vue SPA
    root /home/pi/bakesail/src/frontend/dist;
    index index.html;

    # -------------------------------------------------------------------------
    # Moonraker API proxy — all Moonraker paths forwarded
    # Must be declared before the catch-all location /
    # -------------------------------------------------------------------------

    # JSON-RPC / REST API
    location /api {
        proxy_pass http://moonraker;
    }

    # Printer object queries, gcode, etc.
    location /printer {
        proxy_pass http://moonraker;
    }

    # File manager (list, upload, download, delete)
    location /server {
        proxy_pass         http://moonraker;
        client_max_body_size 200M;   # allow large firmware/config uploads
    }

    # Access control
    location /access {
        proxy_pass http://moonraker;
    }

    # Machine control (reboot, shutdown)
    location /machine {
        proxy_pass http://moonraker;
    }

    # Moonraker websocket
    location /websocket {
        proxy_pass         http://moonraker;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Webcam proxy (Crowsnest listens on 8080 by default)
    location /webcam/ {
        proxy_pass http://127.0.0.1:8080/;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
