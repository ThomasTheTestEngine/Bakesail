# =============================================================================
# Bakesail nginx site configuration
# Replaces the Mainsail site config. Mainsail's original is backed up
# to ~/bakesail/.nginx_backup/mainsail.bak by the installer.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream moonraker {
    # Moonraker's default address — adjust port here if changed
    server 127.0.0.1:7125;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Serve the Bakesail Vue SPA
    root /home/pi/bakesail/src/frontend/dist;
    index index.html;

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Moonraker API proxy (matches Mainsail's upstream config so the Vue app
    # can talk to Moonraker at /api without CORS issues)
    # -------------------------------------------------------------------------
    location /api {
        proxy_pass http://moonraker;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Moonraker websocket
    location /websocket {
        proxy_pass         http://moonraker;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }

    # Moonraker access control list API
    location ~ /access/ {
        proxy_pass http://moonraker;
    }

    # Webcam proxy (Crowsnest listens on 8080 by default)
    location /webcam/ {
        proxy_pass http://127.0.0.1:8080/;
    }

    # Static assets — long cache, exact paths
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
